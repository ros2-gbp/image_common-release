## Default configuration, generated by rosdoc2.

## This 'attic section' self-documents this file's type and version.
type: 'rosdoc2 config'
version: 1

---

settings:
  always_run_doxygen: true

builders:
    ## Each stanza represents a separate build step, performed by a specific 'builder'.

    - doxygen: {
        name: 'image_transport Public C/C++ API',
        output_dir: 'generated/doxygen',
        extra_doxyfile_statements: [
            'PREDEFINED = DOXYGEN_SHOULD_SKIP_THIS IMAGE_TRANSPORT_PUBLIC= IMAGE_TRANSPORT_LOCAL= IMAGE_TRANSPORT_PUBLIC_TYPE= IMAGE_TRANSPORT_EXPORT= IMAGE_TRANSPORT_IMPORT=',
            'EXTRACT_ALL = YES',
            'EXTRACT_PRIVATE = NO',
            'EXTRACT_STATIC = YES',
            'ENABLE_PREPROCESSING = YES',
            'QUIET = YES'
        ]
    }
    - sphinx: {
        name: 'image_transport',
        sphinx_sourcedir: doc,
        doxygen_xml_directory: 'generated/doxygen/xml',
        output_dir: ''
    }
